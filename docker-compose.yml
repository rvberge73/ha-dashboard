version: '3.8'

services:
  ha-dashboard:
    build:
      context: .
      args:
        # Dit trekt automatisch de waarden uit je lokale .env bestand tijdens het bouwen
        VITE_HA_URL: ${VITE_HA_URL}
        VITE_HA_TOKEN: ${VITE_HA_TOKEN}
    container_name: ha-dashboard
    ports:
      - "8080:80" # Je kunt het dashboard benaderen op poort 8080 (http://localhost:8080)
    restart: unless-stopped
